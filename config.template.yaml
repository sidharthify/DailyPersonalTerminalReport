# DPTR Configuration Template
# Copy this to config.yaml and customise.

user:
  name: "Your Name"
  greeting: "Good Morning"
  lat: null   # Your latitude  (used by weather, astronomy, AQI modules)
  lon: null   # Your longitude

# Wake-up detection settings
wakeup:
  enabled: true
  min_gap_hours: 6    # Minimum hours since last report before showing again
  cutoff_hour: 15     # Don't show after this hour (24-h, 15 = 3 PM)
  terminal: "kitty"   # Terminal emulator: kitty | alacritty | gnome-terminal | xterm | konsole | wezterm

# Global settings
settings:
  master_currency: "USD"  # All financial modules convert to this currency

# Report layout — add, remove, or reorder any section.
layout:
  - module: "weather"
    title: "WEATHER"
    config:
      lat: null
      lon: null

  - module: "astronomy"
    title: "ASTRONOMY"
    config:
      lat: null
      lon: null

  - module: "openmeteo"
    title: "AIR QUALITY (Global)"
    config:
      lat: null
      lon: null

  - module: "breatheoss"
    title: "AIR QUALITY (Jammu & Kashmir)"
    config:
      city: "Srinagar"

  - module: "news"
    title: "TECH FEEDS"
    feeds:
      - feed: "techcrunch"
        count: 1
      - feed: "theverge"
        count: 1

  - module: "hacker_news"
    title: "HACKER NEWS"
    config:
      count: 3

  - module: "github_trending"
    title: "GITHUB TRENDING"
    config:
      count: 3
      language: "python"

  - module: "calendar"
    title: "CALENDAR"
    config:
      holidays_file: "holidays.json"

  - module: "system"
    title: "SYSTEM STATS"
    config:
      disks:
        - path: "/"
          label: "Root"

  - module: "ha"
    title: "HOME ASSISTANT"
    config:
      entities:
        - entity_id: "sensor.processor_temperature"
          label: "CPU Temp"

  - module: "word_of_the_day"
    title: "WORD OF THE DAY"

  - module: "daily_joke"
    title: "DAILY JOKE"

  - module: "fact_of_the_day"
    title: "FACT OF THE DAY"

  - module: "shower_thoughts"
    title: "SHOWER THOUGHTS"
    config:
      count: 3

  - module: "email_inbox"
    title: "RECENT EMAILS"
    config:
      count: 3

  - module: "gplay"
    title: "APP STATS (Google Play)"
    config:
      package_name: "com.example.app"

  - module: "essentials"
    title: "REPORT REVIEW"

  - module: "quotes"
    config:
      quotes_file: "quotes.json"
